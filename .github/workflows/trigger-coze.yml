name: 触发Coze中日韩财经工作流
on:
  workflow_dispatch:  # 允许手动触发
  schedule:
    # 北京时间 7:30 → UTC 前一天 23:30
    - cron: '30 23 * * *'
    # 北京时间 12:00 → UTC 04:00
    - cron: '0 4 * * *'
    # 北京时间 18:00 → UTC 10:00
    - cron: '0 10 * * *'

