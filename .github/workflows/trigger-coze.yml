  schedule:
    # 北京时间 7:30 → UTC 前一天 23:30
    - cron: '30 23 * * *'
    # 北京时间 12:00 → UTC 04:00
    - cron: '0 4 * * *'
    # 北京时间 18:00 → UTC 10:00
